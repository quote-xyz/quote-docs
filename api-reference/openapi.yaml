openapi: 3.0.3
info:
  title: Quote API
  version: 0.1.0
  description: |-
    Hand-authored reference for the Quote Hyperliquid trading backend (Rust/axum).

    ## Wallet-scoped model
    Every authenticated request is resolved to a single normalized
    `wallet_address` by the auth layer. TiKV signing-key IDs, agent rows,
    template ownership, strategy ownership, invites, referrals, and analytics
    are all keyed by that wallet. Handlers never read `walletAddress` from
    request bodies or query strings. The caller identity always comes from the
    credential, never from the payload.

    ## Authentication
    Authenticate with an **HMAC API key** (`ApiKeyHmac`); see that security
    scheme for the canonical signing string. Keys are minted, listed, and
    revoked in the Quote terminal (**Settings → API Keys**); the secret is
    shown once at mint time. A key carries only the scopes granted at mint
    time and must satisfy the per-endpoint scope noted in each operation's
    description.

    Routes under `/api/*` require authentication, except the public
    `/api/info`. The root probes `/health`, `/ready`, and `/metrics` are
    unauthenticated.

    ## Async-accept order model
    `POST /api/orders` returns `200` when the order (or algo strategy) is
    **accepted into the execution engine**, NOT when it is filled. For algo
    strategies the response carries the parent order id; fills and progress
    arrive asynchronously (queryable via `GET /api/orders/algo*` or the
    `/ws/algos` WebSocket). Parent cancel success likewise means the cancel was
    durably accepted and child orders will be reconciled before a terminal
    state is recorded. It does not by itself mean the strategy is terminated.

    ## Order constraints (Hyperliquid)
    - **Minimum order notional ~$10**: Hyperliquid rejects orders below ~$10
      notional; sub-minimum child slices are skipped by strategies.
    - **Builder fee (approval required to trade)**: every order routed through
      Quote carries Quote's builder code. Hyperliquid rejects orders whose
      sender has not approved the builder fee, so trading via the API requires
      a one-time `approveBuilderFee` signature from the master wallet
      (performed in the terminal; verify via `builderFeeApproved` on
      `GET /api/agents`). The builder address must be lowercase hex; the fee
      field is in tenths of a basis point (2 bps = 20). Attachment is handled
      server-side.
    - **Price/size precision**: size is rounded to the asset's `szDecimals`;
      price is limited to 5 significant figures and `MAX_DECIMALS - szDecimals`
      decimal places.

    ## Error envelope
    All `4xx`/`5xx` responses (except `413` and `204`) use the JSON shape
    `{ "success": false, "error": "<message>" }`.
servers:
- url: https://api.quotemarkets.xyz
  description: Production
- url: http://localhost:3001
  description: Local development
tags:
- name: Orders
  description: Order submission, cancellation, modification, and algo-order status.
- name: Agents
  description: Agent wallet lifecycle (create, register, builder-fee approval, terms).
- name: Positions
  description: Leverage, margin, and spot/perp transfer actions.
- name: Templates
  description: Saved order templates (CRUD).
- name: Triggers
  description: Conditional triggers (CRUD + history).
- name: Analytics
  description: Execution-quality, volume, and fee analytics.
- name: Funding
  description: 'Funding-payment tracking: totals, timeline, and history.'
- name: Portfolio
  description: Quote-owned hourly equity time-series.
- name: Health
  description: Liveness/readiness probes, info, and Prometheus metrics.
security:
- ApiKeyHmac: []
paths:
  /api/orders:
    post:
      tags:
      - Orders
      summary: Submit an order or algo strategy
      description: |
        Submit a plain order (limit/market) or an algo strategy order.

        **Auth:** API-key scope:
        `orders:write`.

        **Async-accept:** a `200` means the order/strategy was **accepted into
        the engine**, not that it filled. For algo strategies (`strategy` set),
        `orderId` is the parent strategy id; track progress via
        `GET /api/orders/algo`.

        Sub-$10-notional orders are rejected by Hyperliquid; orders routed
        through Quote carry Quote's builder fee automatically.

        **Prerequisites:** a registered agent wallet AND builder-fee approval
        on the caller's wallet. Hyperliquid rejects orders from wallets that
        have not approved Quote's builder fee. Check `builderFeeApproved` via
        `GET /api/agents` before trading.
      operationId: submitOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitOrderRequest'
      responses:
        '200':
          description: Order accepted into the engine (not necessarily filled).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/orders/cancel:
    post:
      tags:
      - Orders
      summary: Cancel a single order
      description: |
        Cancel a resting order or request cancellation of an algo strategy.

        **Auth:** API-key scope: `orders:write`.

        For a strategy parent, the response indicates only that the cancel was
        *requested*. Venue child orders are reconciled before a terminal state
        is recorded.
      operationId: cancelOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Cancel succeeded or was durably requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/orders/cancel-all:
    post:
      tags:
      - Orders
      summary: Cancel all open orders
      description: |
        Cancel all of the caller's open orders, optionally filtered by symbol.

        **Auth:** API-key scope: `orders:write`.
      operationId: cancelAllOrders
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAllOrdersRequest'
      responses:
        '200':
          description: Returns the number of orders cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/orders/modify:
    post:
      tags:
      - Orders
      summary: Modify an existing order
      description: |
        Update the price and/or size of an existing order via Hyperliquid's
        modify action.

        **Auth:** API-key scope: `orders:write`.
      operationId: modifyOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyOrderRequest'
      responses:
        '200':
          description: Order modified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/orders/algo:
    get:
      tags:
      - Orders
      summary: List algo (strategy) orders
      description: |
        List the caller's algo/strategy orders from the Postgres read
        projection.

        **Auth:** API-key scope: `orders:read`.
      operationId: getAlgoOrders
      responses:
        '200':
          description: List of algo orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlgoOrdersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/orders/algo/{order_id}:
    get:
      tags:
      - Orders
      summary: Get a single algo order
      description: |
        Fetch a single algo/strategy order by parent order id. Must belong to
        the caller's wallet.

        **Auth:** API-key scope: `orders:read`.
      operationId: getAlgoOrder
      parameters:
      - name: order_id
        in: path
        required: true
        description: Parent strategy order id.
        schema:
          type: string
      responses:
        '200':
          description: The algo order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlgoOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/agents:
    post:
      tags:
      - Agents
      summary: Create an agent wallet
      description: |
        Generate a locally-encrypted agent wallet (AES-256-GCM secp256k1) for
        the caller. Returns the agent address to be approved on Hyperliquid via
        `POST /api/agents/register`.

        **Auth:** API-key scope: `agents:write`.
      operationId: createAgent
      responses:
        '200':
          description: Agent created (or already existing).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      tags:
      - Agents
      summary: Get the caller's agent wallet
      description: |
        Return the caller's agent wallet, verifying registration against
        Hyperliquid. Only registered agents are returned. A missing/unregistered
        agent yields `success: true` with no `agentAddress`; an expired agent
        yields `expired: true`.

        Before trading, also check `builderFeeApproved`: Hyperliquid rejects
        Quote-routed orders from wallets that have not approved the builder
        fee.

        **Auth:** API-key scope: `agents:read`.
      operationId: getAgent
      responses:
        '200':
          description: Agent info (possibly empty/expired).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/agents/register:
    post:
      tags:
      - Agents
      summary: Register an agent wallet with Hyperliquid
      description: |
        Submit a signed `approveAgent` action to Hyperliquid for the caller's
        agent. The signature is produced client-side over the agent address and
        nonce.

        **Auth:** API-key scope: `agents:write`.
      operationId: registerAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
      responses:
        '200':
          description: Agent registered (or already registered).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterAgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/agents/builder-approval:
    post:
      tags:
      - Agents
      summary: Record builder-fee approval
      description: |
        Record that the caller approved Quote's builder fee on Hyperliquid
        (HL is the source of truth). Builder-fee approval is **required to
        trade**: the `approveBuilderFee` action is signed by the master wallet
        and submitted to Hyperliquid by the terminal; without it Hyperliquid
        rejects every Quote-routed order.

        **Auth:** API-key scope: `agents:write`.
      operationId: recordBuilderApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordBuilderApprovalRequest'
      responses:
        '200':
          description: Recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/agents/accept-terms:
    post:
      tags:
      - Agents
      summary: Accept terms of service
      description: |
        Record the caller's acceptance of a terms version and analytics consent.

        **Auth:** API-key scope: `agents:write`.
      operationId: acceptTerms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptTermsRequest'
      responses:
        '200':
          description: Recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/positions/leverage:
    post:
      tags:
      - Positions
      summary: Update leverage
      description: |
        Sign and submit an `updateLeverage` action via the agent wallet.

        **Auth:** API-key scope: `positions:write`.
      operationId: updateLeverage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeverageRequest'
      responses:
        '200':
          description: Leverage updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/positions/margin:
    post:
      tags:
      - Positions
      summary: Update isolated margin
      description: |
        Sign and submit an `updateIsolatedMargin` action via the agent wallet.
        Positive `marginDelta` adds margin, negative removes.

        **Auth:** API-key scope: `positions:write`.
      operationId: updateMargin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMarginRequest'
      responses:
        '200':
          description: Margin updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/positions/transfer:
    post:
      tags:
      - Positions
      summary: Transfer between spot and perp
      description: |
        Sign and submit a `spotUser` transfer action via the agent wallet.
        `amount` is in USD and must be positive.

        **Auth:** API-key scope: `positions:write`.
      operationId: transferSpotPerp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferSpotPerpRequest'
      responses:
        '200':
          description: Transfer submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/templates:
    get:
      tags:
      - Templates
      summary: List order templates
      description: |
        List the caller's saved order templates.

        **Auth:** API-key scope: `templates:read`.
      operationId: listTemplates
      responses:
        '200':
          description: List of templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTemplatesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
      - Templates
      summary: Create an order template
      description: |
        Create a saved order template. `urgency` and `priceDiscipline` must be
        between 0 and 100.

        **Auth:** API-key scope: `templates:write`.
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/templates/{template_id}:
    get:
      tags:
      - Templates
      summary: Get a template
      description: |
        Fetch one of the caller's templates by id (UUID).

        **Auth:** API-key scope: `templates:read`.
      operationId: getTemplate
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: The template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      tags:
      - Templates
      summary: Update a template
      description: |
        Update one of the caller's templates. Provided `urgency`/`priceDiscipline`
        must be 0–100.

        **Auth:** API-key scope: `templates:write`.
      operationId: updateTemplate
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Template updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      tags:
      - Templates
      summary: Delete a template
      description: |
        Delete one of the caller's templates by id.

        **Auth:** API-key scope: `templates:write`.
      operationId: deleteTemplate
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/triggers:
    get:
      tags:
      - Triggers
      summary: List conditional triggers
      description: |
        List the caller's conditional triggers, optionally filtered by status.

        **Auth:** API-key scope: `orders:read`.
      operationId: listTriggers
      parameters:
      - name: status
        in: query
        required: false
        description: 'One of: active, triggered, cancelled, expired, failed.'
        schema:
          type: string
          enum:
          - active
          - triggered
          - cancelled
          - expired
          - failed
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: List of triggers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTriggersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
      - Triggers
      summary: Create a conditional trigger
      description: |
        Create a conditional trigger. `triggerType` must be a known type
        (e.g. `price`, `copy_trade`, `funding`, `oi_change`, `time`). The
        `condition` and `executionOrder` payloads are opaque JSON interpreted by
        the trigger evaluator.

        **Auth:** API-key scope: `orders:write`.
      operationId: createTrigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTriggerRequest'
      responses:
        '201':
          description: Trigger created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/triggers/{trigger_id}:
    get:
      tags:
      - Triggers
      summary: Get a trigger
      description: |
        Fetch one of the caller's triggers by id (UUID).

        **Auth:** API-key scope: `orders:read`.
      operationId: getTrigger
      parameters:
      - $ref: '#/components/parameters/TriggerId'
      responses:
        '200':
          description: The trigger.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    delete:
      tags:
      - Triggers
      summary: Cancel a trigger
      description: |
        Cancel one of the caller's active triggers (status -> `cancelled`).

        **Auth:** API-key scope: `orders:write`.
      operationId: cancelTrigger
      parameters:
      - $ref: '#/components/parameters/TriggerId'
      responses:
        '200':
          description: Trigger cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
