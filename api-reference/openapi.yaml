components:
  securitySchemes:
    ApiKeyHmac:
      type: apiKey
      in: header
      name: X-Quote-Key
      description: |
        HMAC API-key authentication. Three headers are sent on every request:

        - `X-Quote-Key`: the public key id (this scheme's header).
        - `X-Quote-Timestamp`: request time in **milliseconds** since epoch.
          Must be within 30 seconds of server time.
        - `X-Quote-Signature`: hex HMAC-SHA256 over the canonical string.

        **Canonical signing string** (literal `\n` separators):

        ```
        <timestamp>\n<METHOD>\n<path_with_query>\n<body>
        ```

        where `<timestamp>` is the `X-Quote-Timestamp` value, `<METHOD>` is the
        uppercase HTTP method, `<path_with_query>` is the request path including
        any query string, and `<body>` is the raw request body (empty string if
        none). The 32-byte secret returned at mint time is used **directly** as
        the HMAC-SHA256 key.

        Keys are minted, listed, and revoked in the Quote terminal
        (**Settings → API Keys**). A key carries only the scopes granted at mint
        time.
  parameters:
    TemplateId:
      name: template_id
      in: path
      required: true
      description: Template UUID.
      schema:
        type: string
        format: uuid
    TriggerId:
      name: trigger_id
      in: path
      required: true
      description: Trigger UUID.
      schema:
        type: string
        format: uuid
    AnalyticsRange:
      name: range
      in: query
      required: false
      description: 'Time range. One of: 1d, 7d, 30d, all. Defaults to a server default when omitted.'
      schema:
        type: string
        enum:
        - 1d
        - 7d
        - 30d
        - all
  responses:
    BadRequest:
      description: Invalid request (validation error, malformed body/UUID, etc.).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 'Authenticated but not permitted: the API key lacks the required scope.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found or not owned by the caller's wallet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream (Hyperliquid/Relay) returned an error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: |
        A required dependency is unavailable or a feature is not configured
        (also returned when a Hyperliquid circuit breaker is open).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: |
        Request body exceeds the 4 MiB limit enforced by the body-buffering
        layer. The response body is not the standard JSON error envelope.
  schemas:
    ErrorResponse:
      type: object
      description: Standard error envelope used for 4xx/5xx (except 413/204).
      required:
      - success
      - error
      properties:
        success:
          type: boolean
          enum:
          - false
        error:
          type: string
    SuccessResponse:
      type: object
      required:
      - success
      properties:
        success:
          type: boolean
          enum:
          - true
    MessageResponse:
      type: object
      description: Generic success response with an optional human-readable message.
      required:
      - success
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
    Side:
      type: string
      enum:
      - buy
      - sell
    OrderType:
      type: string
      enum:
      - limit
      - market
    TimeInForce:
      type: string
      description: Time in force. Serialized as the uppercase variant names.
      enum:
      - GTC
      - ALO
      - IOC
    TpslMode:
      type: string
      enum:
      - market
      - limit
    TpslSide:
      type: object
      required:
      - triggerPrice
      properties:
        triggerPrice:
          type: string
        limitPrice:
          type: string
          nullable: true
    TpslParams:
      type: object
      description: TP/SL configuration. Note `mode`, `tp`, `sl` are snake/lower as named.
      required:
      - mode
      properties:
        mode:
          $ref: '#/components/schemas/TpslMode'
        tp:
          allOf:
          - $ref: '#/components/schemas/TpslSide'
          nullable: true
        sl:
          allOf:
          - $ref: '#/components/schemas/TpslSide'
          nullable: true
    StrategyParamsInput:
      type: object
      description: |
        Strategy-specific parameters forwarded to the execution engine. This is
        a large, mostly-optional bag of knobs; the relevant subset depends on
        the chosen `strategy`. Fields accept both camelCase and snake_case keys
        (serde aliases). Numeric "bps"/decimal fields accept string, integer, or
        float JSON. Only commonly-used fields are enumerated here; additional
        properties are accepted.
      additionalProperties: true
      properties:
        reduceOnly:
          type: boolean
          nullable: true
        timeInForce:
          type: string
          nullable: true
          description: Child-order TIF (gtc/alo/ioc), strategy-dependent.
        attachedTpsl:
          allOf:
          - $ref: '#/components/schemas/TpslParams'
          nullable: true
        durationSecs:
          type: integer
          format: int64
          nullable: true
        numSlices:
          type: integer
          format: int64
          nullable: true
        passivePct:
          type: integer
          format: int64
          nullable: true
        clipSize:
          type: string
          nullable: true
          description: Decimal as string.
        clipPct:
          type: number
          format: double
          nullable: true
        participationRate:
          type: string
          nullable: true
          description: Decimal as string.
        urgency:
          type: integer
          format: int64
          nullable: true
          description: 0–100.
        distributionSkew:
          type: integer
          format: int64
          nullable: true
          description: 0–100.
        randomize:
          type: boolean
          nullable: true
        maxSlippageBps:
          type: string
          nullable: true
        hardCancelPct:
          type: string
          nullable: true
        offsetFromMidBps:
          type: integer
          format: int64
          nullable: true
        chaseEnabled:
          type: boolean
          nullable: true
        observationMode:
          type: boolean
          nullable: true
        guaranteedCompletion:
          type: boolean
          nullable: true
        queueImproveThreshold:
          type: integer
          format: int64
          nullable: true
    SubmitOrderRequest:
      type: object
      required:
      - symbol
      - side
      - size
      - orderType
      properties:
        symbol:
          type: string
          example: ETH
        side:
          $ref: '#/components/schemas/Side'
        size:
          type: string
          description: Base-asset size as a decimal string.
        orderType:
          $ref: '#/components/schemas/OrderType'
        limitPrice:
          type: string
          nullable: true
          description: Required for limit orders; for market orders supply a slippage-adjusted price.
        reduceOnly:
          type: boolean
          nullable: true
          default: false
        timeInForce:
          allOf:
          - $ref: '#/components/schemas/TimeInForce'
          nullable: true
        clientOrderId:
          type: string
          nullable: true
        strategy:
          type: string
          nullable: true
          description: Algo strategy name (e.g. passive_twap, adaptive_is, vwap, iceberg, participation_rate,
            chase_limit). Omit for a plain order.
        params:
          allOf:
          - $ref: '#/components/schemas/StrategyParamsInput'
          nullable: true
        tpsl:
          allOf:
          - $ref: '#/components/schemas/TpslParams'
          nullable: true
    SubmitOrderResponse:
      type: object
      required:
      - success
      properties:
